.urgency-badge { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border-width: 2px; border-style: solid; flex-shrink: 0; }

<script>
// ══════════════════════════════════════════════════════════
// CONFIG — pré-rempli, tu n'as besoin que du token
// ══════════════════════════════════════════════════════════
const GH_USER  = 'loulisse';
const GH_REPO  = 'Movetogether-';
const GH_FILE  = 'data.json';

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let TOKEN = '';
let STATE = {
  house: 'current',
  tab: 'summary',
  data: { current: { tasks:[], unboundItems:[] }, future: { tasks:[], unboundItems:[] } },
  sha: null,
  editingTaskId: null,
  formPhotos: { before:[], inspiration:[] },
  formItems: []
};

const UC = ['','#22c55e','#22c55e','#22c55e','#f59e0b','#f59e0b','#f59e0b','#f97316','#f97316','#ef4444','#ef4444'];
function uc(u){ return UC[u]||'#22c55e'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function houseData(){ return STATE.data[STATE.house]; }
function itemsTotal(items){ return (items||[]).reduce((s,i)=>s+(parseFloat(i.price)||0),0); }
function formatDate(d){ if(!d)return''; return new Date(d+'T00:00:00').toLocaleDateString('fr-CH',{day:'numeric',month:'long'}); }

// ══════════════════════════════════════════════════════════
// SETUP & AUTH
// ══════════════════════════════════════════════════════════
function showErr(msg){
  const el=document.getElementById('setup-error');
  el.innerHTML=msg; el.style.display='block';
}

async function setupApp(){
  const t = document.getElementById('gh-token').value.trim();
  if(!t){ showErr('Entre ton token GitHub.'); return; }

  const btn = document.getElementById('connect-btn');
  btn.disabled=true; btn.textContent='Connexion…';
  document.getElementById('setup-error').style.display='none';

  TOKEN = t;
  const ok = await loadFromGitHub();

  if(ok){
    localStorage.setItem('mt_token', TOKEN);
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').style.display='block';
    render();
    setInterval(pollGitHub, 20000);
  } else {
    btn.disabled=false; btn.textContent='Connecter →';
    TOKEN='';
    showErr('❌ Connexion échouée.<br>Vérifie que ton token a bien les droits <b>repo</b> et qu\'il n\'est pas expiré.');
  }
}

function logout(){
  localStorage.removeItem('mt_token');
  TOKEN='';
  document.getElementById('app').style.display='none';
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('gh-token').value='';
  document.getElementById('connect-btn').disabled=false;
  document.getElementById('connect-btn').textContent='Connecter →';
}

// ══════════════════════════════════════════════════════════
// GITHUB API
// ══════════════════════════════════════════════════════════
function ghUrl(){ return `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`; }
function ghHeaders(){ return { 'Authorization':'token '+TOKEN, 'Content-Type':'application/json', 'Accept':'application/vnd.github.v3+json' }; }

async function loadFromGitHub(){
  try {
    const res = await fetch(ghUrl(), { headers: ghHeaders() });
    if(res.status===404){
      STATE.sha=null;
      return await saveToGitHub();
    }
    if(!res.ok) return false;
    const json = await res.json();
    STATE.sha = json.sha;
    const decoded = JSON.parse(atob(json.content.replace(/\n/g,'')));
    if(!decoded.current) decoded.current={tasks:[],unboundItems:[]};
    if(!decoded.future)  decoded.future ={tasks:[],unboundItems:[]};
    STATE.data = decoded;
    return true;
  } catch(e){ console.error(e); return false; }
}

async function saveToGitHub(){
  setSyncStatus('ing');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(STATE.data,null,2))));
    const body = { message:'update data', content };
    if(STATE.sha) body.sha = STATE.sha;
    const res = await fetch(ghUrl(), { method:'PUT', headers:ghHeaders(), body:JSON.stringify(body) });
    if(!res.ok){ setSyncStatus('err'); return false; }
    const json = await res.json();
    STATE.sha = json.content.sha;
    setSyncStatus('ok');
    return true;
  } catch { setSyncStatus('err'); return false; }
}

async function pollGitHub(){
  const res = await loadFromGitHub();
  if(res) render();
}

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot)return;
  dot.className='sync-dot '+(s==='ok'?'sync-ok':s==='ing'?'sync-ing':'sync-err');
  lbl.textContent=s==='ok'?'Synchronisé':s==='ing'?'Sync…':'Erreur sync';
}

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function switchHouse(h){
  STATE.house=h;
  document.getElementById('btn-current').classList.toggle('active',h==='current');
  document.getElementById('btn-future').classList.toggle('active',h==='future');
  render();
}
function switchTab(t){
  STATE.tab=t;
  ['summary','shopping','calendar'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===t));
  document.getElementById('new-task-btn').style.display=t==='calendar'?'none':'';
  render();
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  const labels={summary:'Résumé',shopping:'Achats',calendar:'Calendrier'};
  document.getElementById('section-title').textContent=
    (STATE.house==='current'?'🏠 Maison actuelle':'✨ Nouvelle maison')+' · '+labels[STATE.tab];
  const c=document.getElementById('view-container');
  if(STATE.tab==='summary')  c.innerHTML=renderSummary();
  if(STATE.tab==='shopping') c.innerHTML=renderShopping();
  if(STATE.tab==='calendar') c.innerHTML=renderCalendar();
}

// ─── SUMMARY ──────────────────────────────────────────────
function renderSummary(){
  const tasks=houseData().tasks||[];
  const done=tasks.filter(t=>t.done).length;
  const budget=tasks.reduce((s,t)=>s+itemsTotal(t.items),0);
  const urgent=tasks.filter(t=>t.urgency>=8&&!t.done).length;
  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:#22c55e">${done}/${tasks.length}</div><div class="stat-lbl">tâches</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#818cf8">~${budget.toFixed(0)}</div><div class="stat-lbl">CHF estimé</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#ef4444">${urgent}</div><div class="stat-lbl">urgentes</div></div>
  </div>`;
  if(!tasks.length) return html+`<div class="empty-state"><div style="font-size:44px;margin-bottom:12px">📋</div>Aucune tâche — commence !</div>`;
  [...tasks].sort((a,b)=>b.urgency-a.urgency).forEach(t=>{ html+=renderTaskCard(t); });
  return html;
}

function renderTaskCard(t){
  const total=itemsTotal(t.items);
  const doneI=(t.items||[]).filter(i=>i.done).length;
  const photoN=(t.photos_before||[]).length+(t.photos_inspiration||[]).length;
  const color=uc(t.urgency);
  let meta='';
  if(t.deadline) meta+=`<span style="color:#777;font-size:12px">📅 ${formatDate(t.deadline)}</span>`;
  if(total>0)    meta+=`<span style="color:#818cf8;font-size:12px;font-weight:600">💰 ~${total.toFixed(0)} CHF</span>`;
  if(t.items?.length) meta+=`<span style="color:#666;font-size:12px">${doneI}/${t.items.length} articles</span>`;
  if(photoN>0)   meta+=`<span style="color:#666;font-size:12px">🖼 ${photoN}</span>`;

  const chk=`<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>`;
  const chkSm=`<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>`;

  let body='';
  if(t._open){
    body=`<div class="task-card-body">`;
    if(t.description) body+=`<p style="color:#999;font-size:14px;margin:12px 0;line-height:1.55">${esc(t.description)}</p>`;
    if(t.items?.length){
      body+=`<div class="section-label">Articles à acheter</div>`;
      t.items.forEach(item=>{
        body+=`<div class="item-row" style="padding:7px 10px;border-radius:10px;margin-bottom:4px">
          <div class="checkbox checkbox-sm ${item.done?'checked':''}" onclick="toggleItem('${t.id}','${item.id}')" style="cursor:pointer">
            ${item.done?chkSm:''}
          </div>
          <span style="flex:1;color:${item.done?'#555':'#ddd'};font-size:14px;text-decoration:${item.done?'line-through':'none'}">${esc(item.name)}</span>
          ${item.price?`<span style="color:#818cf8;font-size:13px">${item.price} CHF</span>`:''}
        </div>`;
      });
    }
    if(t.photos_before?.length){
      body+=`<div class="section-label">État actuel</div><div class="gap-6" style="margin-bottom:10px">`;
      t.photos_before.forEach(p=>{ body+=`<img src="${p.data}" style="width:85px;height:65px;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,0.08);cursor:pointer" onclick="viewPhoto('${p.data}')" />`; });
      body+=`</div>`;
    }
    if(t.photos_inspiration?.length){
      body+=`<div class="section-label">Inspiration</div><div class="gap-6" style="margin-bottom:12px">`;
      t.photos_inspiration.forEach(p=>{ body+=`<img src="${p.data}" style="width:85px;height:65px;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,0.08);cursor:pointer" onclick="viewPhoto('${p.data}')" />`; });
      body+=`</div>`;
    }
    body+=`<div class="gap-8">
      <button class="btn btn-accent btn-sm" onclick="openTaskModal('${t.id}')">✏️ Modifier</button>
      <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">🗑 Supprimer</button>
    </div></div>`;
  }

  return `<div class="task-card ${t.done?'done':''}" id="card-${t.id}">
    <div class="task-card-header" onclick="toggleCard('${t.id}')">
      <div class="checkbox ${t.done?'checked':''}" onclick="event.stopPropagation();toggleTaskDone('${t.id}')" style="cursor:pointer;margin-top:2px">
        ${t.done?chk:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
          <span style="color:${t.done?'#555':'#f1f5f9'};font-weight:700;font-size:15px;text-decoration:${t.done?'line-through':'none'}">${esc(t.title)}</span>
          ${t.room?`<span class="tag">${esc(t.room)}</span>`:''}
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">${meta}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="urgency-badge" style="color:${color};border-color:${color};background:${color}18">${t.urgency}</div>
        <span style="color:#444;transition:0.2s;display:inline-block;transform:${t._open?'rotate(180deg)':'rotate(0)'};font-size:12px">▾</span>
      </div>
    </div>${body}
  </div>`;
}

// ─── SHOPPING ─────────────────────────────────────────────
function renderShopping(){
  const tasks=houseData().tasks||[];
  const unbound=houseData().unboundItems||[];
  const taskItems=tasks.flatMap(t=>(t.items||[]).map(i=>({...i,taskTitle:t.title})));
  const all=[...taskItems,...unbound];
  const totalDone=all.filter(i=>i.done).length;
  const totalCost=all.reduce((s,i)=>s+(parseFloat(i.price)||0),0);
  const spent=all.filter(i=>i.done).reduce((s,i)=>s+(parseFloat(i.price)||0),0);
  const chkSm=`<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>`;

  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px">
    <div class="stat-card"><div class="stat-val" style="color:#22c55e">${totalDone}/${all.length}</div><div class="stat-lbl">achetés</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#818cf8">${spent.toFixed(0)}/${totalCost.toFixed(0)}</div><div class="stat-lbl">CHF dépensés</div></div>
  </div>`;

  if(taskItems.length){
    html+=`<div class="section-label" style="margin-top:0">Liés à une tâche</div>`;
    taskItems.forEach(item=>{
      html+=`<div class="item-row">
        <div class="checkbox checkbox-sm ${item.done?'checked':''}" style="flex-shrink:0">${item.done?chkSm:''}</div>
        <div style="flex:1"><div style="color:${item.done?'#555':'#ddd'};font-size:14px;text-decoration:${item.done?'line-through':'none'}">${esc(item.name)}</div>
        <div style="color:#555;font-size:11px">📌 ${esc(item.taskTitle)}</div></div>
        ${item.price?`<span style="color:#818cf8;font-size:13px;font-weight:600">${item.price} CHF</span>`:''}
      </div>`;
    });
  }

  html+=`<div class="section-label">Articles divers</div>`;
  unbound.forEach(item=>{
    html+=`<div class="item-row" style="${item.done?'background:rgba(34,197,94,0.05);border-color:rgba(34,197,94,0.18)':''}">
      <div class="checkbox checkbox-sm ${item.done?'checked':''}" onclick="toggleUnbound('${item.id}')" style="cursor:pointer">${item.done?chkSm:''}</div>
      <span style="flex:1;color:${item.done?'#555':'#ddd'};font-size:14px;text-decoration:${item.done?'line-through':'none'}">${esc(item.name)}</span>
      ${item.price?`<span style="color:#818cf8;font-size:13px">${item.price} CHF</span>`:''}
      <button class="btn btn-ghost btn-sm" style="padding:4px 6px" onclick="deleteUnbound('${item.id}')">🗑</button>
    </div>`;
  });

  html+=`<div class="gap-8" style="margin-top:10px">
    <input class="inp" id="new-item-name" placeholder="Nouvel article…" style="flex:2" onkeydown="if(event.key==='Enter')addUnbound()" />
    <input class="inp" id="new-item-price" placeholder="CHF" type="number" style="flex:1;max-width:80px" />
    <button class="btn btn-accent btn-sm" onclick="addUnbound()">+</button>
  </div>`;
  return html;
}

// ─── CALENDAR ─────────────────────────────────────────────
function renderCalendar(){
  const tasks=(houseData().tasks||[]).filter(t=>t.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  if(!tasks.length) return `<div class="empty-state"><div style="font-size:44px;margin-bottom:12px">📅</div>Aucune tâche avec deadline</div>`;
  const now=new Date();
  return tasks.map(t=>{
    const dl=Math.ceil((new Date(t.deadline+'T00:00:00')-now)/86400000);
    const c=dl<0?'#ef4444':dl<=7?'#f59e0b':'#22c55e';
    return `<div style="display:flex;gap:13px;padding:14px 15px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;margin-bottom:10px;align-items:center">
      <div style="min-width:48px;text-align:center">
        <div style="color:${c};font-size:21px;font-weight:800">${dl<0?dl:'+'+dl}</div>
        <div style="color:#555;font-size:10px">jours</div>
      </div>
      <div style="flex:1">
        <div style="color:${t.done?'#555':'#f1f5f9'};font-weight:700;font-size:14px;text-decoration:${t.done?'line-through':'none'}">${esc(t.title)}</div>
        <div style="color:#777;font-size:12px;margin-top:2px">${formatDate(t.deadline)}${t.room?' · '+esc(t.room):''}</div>
      </div>
      <div class="urgency-badge" style="color:${uc(t.urgency)};border-color:${uc(t.urgency)};background:${uc(t.urgency)}18">${t.urgency}</div>
    </div>`;
  }).join('');
}

  STATE.editingTaskId=taskId;
  const task=taskId?houseData().tasks.find(t=>t.id===taskId):null;
  STATE.formPhotos={ before:[...(task?.photos_before||[])], inspiration:[...(task?.photos_inspiration||[])] };

  document.getElementById('task-modal').classList.remove('open');

}

function updUrg(v){
document.getElementById(‘f-urg-lbl’).textContent=‘Urgence ‘+v+’/10’;
const el=document.getElementById(‘f-urg-val’);
el.textContent=v; el.style.color=uc(+v);
document.getElementById(‘f-urgency’).style.accentColor=uc(+v);
}

function refreshFormItems(){
const el=document.getElementById(‘form-items’); if(!el)return;
el.innerHTML=STATE.formItems.map(i=>` <div style="display:flex;gap:8px;align-items:center;padding:7px 10px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:5px"> <span style="flex:1;color:#ddd;font-size:14px">${esc(i.name)}</span> ${i.price?`<span style="color:#818cf8;font-size:13px">${i.price} CHF</span>`:''} <button class="btn btn-ghost btn-sm" style="padding:4px 6px" onclick="removeFormItem('${i.id}')">🗑</button> </div>`).join(’’);
}
function addFormItem(){
const n=document.getElementById(‘f-item-name’)?.value.trim();
const p=document.getElementById(‘f-item-price’)?.value.trim();
if(!n)return;
STATE.formItems.push({id:uid(),name:n,price:p,done:false});
document.getElementById(‘f-item-name’).value=’’;
document.getElementById(‘f-item-price’).value=’’;
refreshFormItems();
}
function removeFormItem(id){ STATE.formItems=STATE.formItems.filter(i=>i.id!==id); refreshFormItems(); }

async function handlePhotos(type,input){
for(const file of Array.from(input.files)){
if(!file.type.startsWith(‘image/’))continue;
const data=await resizeImage(file,800);
STATE.formPhotos[type].push({id:uid(),data});
}
input.value=’’; renderFormPhotos();
}
function resizeImage(file,maxW){
return new Promise(res=>{
const img=new Image(), url=URL.createObjectURL(file);
img.onload=()=>{
const sc=Math.min(1,maxW/img.width);
const c=document.createElement(‘canvas’);
c.width=img.width*sc; c.height=img.height*sc;
c.getContext(‘2d’).drawImage(img,0,0,c.width,c.height);
URL.revokeObjectURL(url); res(c.toDataURL(‘image/jpeg’,0.75));
}; img.src=url;
});
}
function renderFormPhotos(){
[‘before’,‘inspiration’].forEach(type=>{
const el=document.getElementById(‘photos-’+type); if(!el)return;
const inpId=type===‘before’?‘f-pb’:‘f-pi’;
el.innerHTML=STATE.formPhotos[type].map(p=>` <div class="photo-thumb"> <img src="${p.data}" onclick="viewPhoto('${p.data}')" /> <button class="photo-del" onclick="removeFormPhoto('${type}','${p.id}')">✕</button> </div>`).join(’’)+
`<button class="photo-add" onclick="document.getElementById('${inpId}').click()">📷<span>Ajouter</span></button>`;
});
}
function removeFormPhoto(type,id){ STATE.formPhotos[type]=STATE.formPhotos[type].filter(p=>p.id!==id); renderFormPhotos(); }

async function saveTask(){
const title=document.getElementById(‘f-title’)?.value.trim();
if(!title)return;
const btn=document.getElementById(‘f-save-btn’);
if(btn){btn.disabled=true;btn.textContent=‘⏳ Sauvegarde…’;}
const task={
id:STATE.editingTaskId||uid(), title,
room:document.getElementById(‘f-room’)?.value.trim()||’’,
deadline:document.getElementById(‘f-deadline’)?.value||’’,
urgency:parseInt(document.getElementById(‘f-urgency’)?.value)||5,
description:document.getElementById(‘f-desc’)?.value.trim()||’’,
items:STATE.formItems,
photos_before:STATE.formPhotos.before,
photos_inspiration:STATE.formPhotos.inspiration,
done:false
};
if(STATE.editingTaskId){
const ex=houseData().tasks.find(t=>t.id===STATE.editingTaskId);
if(ex)task.done=ex.done;
}
const hd=houseData();
const idx=hd.tasks.findIndex(t=>t.id===task.id);
if(idx>=0)hd.tasks[idx]=task; else hd.tasks.push(task);
closeTaskModal(); render();
await saveToGitHub();
}

// ══════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════
function toggleCard(id){
const t=houseData().tasks.find(t=>t.id===id);
if(t)t._open=!t._open; render();
}
async function toggleTaskDone(id){
const t=houseData().tasks.find(t=>t.id===id);
if(t)t.done=!t.done; render(); await saveToGitHub();
}
async function toggleItem(taskId,itemId){
const t=houseData().tasks.find(t=>t.id===taskId); if(!t)return;
const i=t.items.find(i=>i.id===itemId); if(i)i.done=!i.done;
render(); await saveToGitHub();
}
async function deleteTask(id){
if(!confirm(‘Supprimer cette tâche ?’))return;
houseData().tasks=houseData().tasks.filter(t=>t.id!==id);
render(); await saveToGitHub();
}
async function addUnbound(){
const name=document.getElementById(‘new-item-name’)?.value.trim();
const price=document.getElementById(‘new-item-price’)?.value.trim();
if(!name)return;
const hd=houseData(); if(!hd.unboundItems)hd.unboundItems=[];
hd.unboundItems.push({id:uid(),name,price,done:false});
render(); await saveToGitHub();
}
async function toggleUnbound(id){
const i=houseData().unboundItems?.find(i=>i.id===id);
if(i)i.done=!i.done; render(); await saveToGitHub();
}
async function deleteUnbound(id){
houseData().unboundItems=(houseData().unboundItems||[]).filter(i=>i.id!==id);
render(); await saveToGitHub();
}
function viewPhoto(data){
document.getElementById(‘photo-modal-img’).src=data;
document.getElementById(‘photo-modal’).classList.add(‘open’);
}
